<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Theme: apply before paint to prevent flash -->
    <script>
      (function () {
        var t = localStorage.getItem('eds-theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Everyday Digital Solutions</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Everyday Digital Solutions",
        "url": "https://everydaydigitalsolutions.com",
        "logo": "https://everydaydigitalsolutions.com/logo.png",
        "contactPoint": [
          {
            "@type": "ContactPoint",
            "telephone": "+91-90560-66006",
            "contactType": "customer service"
          }
        ],
        "address": [
          {
            "@type": "PostalAddress",
            "addressLocality": "Mohali",
            "addressRegion": "Punjab",
            "postalCode": "140307",
            "streetAddress": "Tecfin Tower, 264-265, Phase 8B, Sector 74, Sahibzada Ajit Singh Nagar",
            "addressCountry": "IN"
          },
          {
            "@type": "PostalAddress",
            "addressLocality": "Jalandhar",
            "addressRegion": "Punjab",
            "postalCode": "144004",
            "streetAddress": "SCO 210, Silver Plaza Complex, Sodal Road",
            "addressCountry": "IN"
          }
        ]
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Theme: apply class before paint to prevent flash -->
    <script>
      (function () {
        var t = localStorage.getItem('eds-theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <!-- Default title & description; react-helmet-async overrides these per page -->
    <title>Everyday Digital Solutions — AI & Custom Software Studio · Mohali, India</title>
    <meta name="description" content="Senior-led custom software, AI voice agents, and automation systems for ambitious service businesses across Chandigarh, Mohali & Jalandhar. Shipped in 30 days." />
    <meta name="theme-color" content="#0f0e08" />
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Preconnect for font performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Plausible analytics: privacy-friendly, no cookie banner needed. Goal events fired via window.plausible('GoalName'). -->
    <script defer data-domain="everydaydigitalsolutions.com" src="https://plausible.io/js/script.tagged-events.js"></script>
    <script>window.plausible = window.plausible || function () { (window.plausible.q = window.plausible.q || []).push(arguments) }</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

kind = "web"
previewPath = "/"
title = "Everyday Digital Solutions"
version = "1.0.0"
id = "artifacts/eds-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25518

[services.development]
run = "pnpm --filter @workspace/eds-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eds-site", "run", "build" ]
publicDir = "artifacts/eds-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25518"
BASE_PATH = "/"

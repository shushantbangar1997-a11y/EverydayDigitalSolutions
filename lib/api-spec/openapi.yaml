openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Everyday Digital Solutions
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Public lead capture (intake form)
  - name: subscribers
    description: Lead-magnet email capture
  - name: stats
    description: Public site statistics (trust ticker)
  - name: admin
    description: Admin dashboard (password-protected)
  - name: quote
    description: AI-powered project quote generator
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /leads:
    post:
      operationId: createLead
      tags: [leads]
      summary: Submit an intake brief
      description: Saves the visitor's full intake brief and triggers a WhatsApp notification to the founder.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "201":
          description: Lead saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscribers:
    post:
      operationId: createSubscriber
      tags: [subscribers]
      summary: Capture an email for the lead-magnet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriberInput"
      responses:
        "201":
          description: Subscriber saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscriber"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getSiteStats
      tags: [stats]
      summary: Public site stats for the trust ticker
      responses:
        "200":
          description: Site stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteStats"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Authenticate as admin
      description: Verifies the password and sets an httpOnly session cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "204":
          description: Authenticated; cookie set
        "401":
          description: Invalid password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Clear the admin session cookie
      responses:
        "204":
          description: Logged out

  /admin/me:
    get:
      operationId: getAdminSession
      tags: [admin]
      summary: Current admin session state
      responses:
        "200":
          description: Session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"

  /admin/refresh:
    post:
      operationId: refreshAdminSession
      tags: [admin]
      summary: Re-issue the admin session cookie (extends expiry)
      responses:
        "204":
          description: Cookie re-issued
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/leads/{id}:
    patch:
      operationId: updateLead
      tags: [admin]
      summary: Update lead status or notes (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadUpdate"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/subscribers:
    get:
      operationId: listSubscribers
      tags: [admin]
      summary: List all newsletter / lead-magnet subscribers (admin only)
      responses:
        "200":
          description: List of subscribers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subscriber"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /quote/generate:
    post:
      operationId: generateQuote
      tags: [quote]
      summary: Generate an AI-powered project quote
      description: Accepts project details, runs the pricing engine, calls AI for scope copy, and returns a full quote with line items and delivery estimate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteInput"
      responses:
        "200":
          description: Quote generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    QuoteProjectType:
      type: string
      enum:
        - mobile_app_cross
        - mobile_app_single
        - web_app
        - website
        - ai_automation
        - ai_voice_agent

    QuoteScale:
      type: string
      enum:
        - small
        - medium
        - large

    QuoteInput:
      type: object
      required:
        - contactName
        - whatsappNumber
        - industry
        - projectType
        - features
        - scale
        - timeline
        - projectDescription
      properties:
        businessName:
          type: ["string", "null"]
        contactName:
          type: string
          minLength: 2
        whatsappNumber:
          type: string
          minLength: 6
        email:
          type: ["string", "null"]
        industry:
          $ref: "#/components/schemas/Industry"
        projectType:
          $ref: "#/components/schemas/QuoteProjectType"
        features:
          type: array
          items:
            type: string
        scale:
          $ref: "#/components/schemas/QuoteScale"
        timeline:
          $ref: "#/components/schemas/Timeline"
        projectDescription:
          type: string
          minLength: 10

    QuoteLineItem:
      type: object
      required:
        - label
        - amount
      properties:
        label:
          type: string
        amount:
          type: integer
        note:
          type: ["string", "null"]

    QuoteDelivery:
      type: object
      required:
        - minDays
        - maxDays
      properties:
        minDays:
          type: integer
        maxDays:
          type: integer

    QuoteResult:
      type: object
      required:
        - quoteRef
        - businessName
        - contactName
        - generatedAt
        - lineItems
        - subtotal
        - total
        - delivery
        - executiveSummary
        - scopeItems
        - validDays
      properties:
        quoteRef:
          type: string
        businessName:
          type: ["string", "null"]
        contactName:
          type: string
        generatedAt:
          type: string
          format: date-time
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/QuoteLineItem"
        subtotal:
          type: integer
        total:
          type: integer
        delivery:
          $ref: "#/components/schemas/QuoteDelivery"
        executiveSummary:
          type: string
        scopeItems:
          type: array
          items:
            type: string
        validDays:
          type: integer

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Industry:
      type: string
      enum:
        - salon_spa
        - real_estate
        - clinic_healthcare
        - restaurant_cafe
        - other_service
        - other

    BudgetBand:
      type: string
      enum:
        - under_1l
        - 1l_to_3l
        - 3l_to_8l
        - 8l_to_20l
        - 20l_plus
        - not_sure

    Timeline:
      type: string
      enum:
        - asap
        - within_1_month
        - 1_to_3_months
        - 3_to_6_months
        - exploring

    LeadStatus:
      type: string
      enum:
        - new
        - contacted
        - qualified
        - closed_won
        - closed_lost

    LeadInput:
      type: object
      required:
        - name
        - whatsappNumber
        - city
        - industry
        - problem
        - goalIn3Months
        - budget
        - timeline
      properties:
        name:
          type: string
          minLength: 2
        businessName:
          type: ["string", "null"]
        whatsappNumber:
          type: string
          minLength: 6
        email:
          type: ["string", "null"]
        city:
          type: string
          minLength: 2
        industry:
          $ref: "#/components/schemas/Industry"
        industryDetails:
          type: object
          additionalProperties: true
        problem:
          type: string
          minLength: 10
        currentSolution:
          type: ["string", "null"]
        goalIn3Months:
          type: string
          minLength: 5
        budget:
          $ref: "#/components/schemas/BudgetBand"
        timeline:
          $ref: "#/components/schemas/Timeline"

    LeadUpdate:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/LeadStatus"
        notes:
          type: ["string", "null"]

    Lead:
      type: object
      required:
        - id
        - name
        - whatsappNumber
        - city
        - industry
        - industryDetails
        - problem
        - goalIn3Months
        - budget
        - timeline
        - status
        - whatsappNotificationSent
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        businessName:
          type: ["string", "null"]
        whatsappNumber:
          type: string
        email:
          type: ["string", "null"]
        city:
          type: string
        industry:
          $ref: "#/components/schemas/Industry"
        industryDetails:
          type: object
          additionalProperties: true
        problem:
          type: string
        currentSolution:
          type: ["string", "null"]
        goalIn3Months:
          type: string
        budget:
          $ref: "#/components/schemas/BudgetBand"
        timeline:
          $ref: "#/components/schemas/Timeline"
        status:
          $ref: "#/components/schemas/LeadStatus"
        notes:
          type: ["string", "null"]
        whatsappNotificationSent:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SubscriberInput:
      type: object
      required:
        - email
        - source
      properties:
        email:
          type: string
          format: email
        source:
          type: string
          minLength: 1

    Subscriber:
      type: object
      required:
        - id
        - email
        - source
        - createdAt
      properties:
        id:
          type: string
        email:
          type: string
        source:
          type: string
        createdAt:
          type: string
          format: date-time

    SiteStats:
      type: object
      required:
        - activeProjects
        - projectsShipped
        - leadsAllTime
      properties:
        activeProjects:
          type: integer
        projectsShipped:
          type: integer
        leadsAllTime:
          type: integer

    AdminLoginInput:
      type: object
      required:
        - password
      properties:
        password:
          type: string
          minLength: 1

    AdminSession:
      type: object
      required:
        - authenticated
      properties:
        authenticated:
          type: boolean
        expiresAt:
          type: ["string", "null"]
          format: date-time
